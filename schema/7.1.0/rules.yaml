# scFAIR schema 7.1.0 compliance rules for validators.
#
# This file drives ASAP scFAIR validators (H5AD + Loom), the compliance report UI,
# and check-detail popups. Ruby code loads it via Scfair::Rules (rules.rb).
#
# Top-level sections (read order for newcomers):
#   schema, paths           - release identity and AnnData <-> Loom path mapping
#   metadata_rules          - general naming / deprecated field rules
#   required                - which metadata columns must exist (obs / uns / var)
#   anndata_indices         - DataFrame index locations (not metadata columns)
#   enum_fields             - closed string value sets per named metadata column
#   field_constraints       - short constraint text for UI popups
#   ontology_*              - format, prefixes, semantics, label pairs
#   constants               - shared lookup tables (not column enums)
#   spatial_extension, perturb_extension - optional schema extensions
#   cross_field             - rules that depend on multiple fields (CF-1 .. CF-9)
#   organism_specific_*     - taxon-dependent ontology prefix rules
#   checks                  - compliance report categories, nested checks, defaults, semantic labels

# Release metadata. schema_version is what files must declare; source_url is the
# canonical schema_reference target for schema.reference checks.
schema:
  id: scfair_7_1_0
  label: scFAIR 7.1.0
  version: "7.1.0"
  schema_version: 7.1.0_scfair
  source_url: https://github.com/scFAIR/scFAIR/blob/main/schema/7.1.0/schema.md

# Logical AnnData layers and their on-disk paths per file format.
# Used by Rules.field_path(format, layer, name) to build check field ids
# (e.g. obs/assay_ontology_term_id vs /col_attrs/assay_ontology_term_id).
paths:
  obs:
    loom: /col_attrs
    h5ad: obs
  var:
    loom: /row_attrs
    h5ad: var
  uns:
    loom: /attrs
    h5ad: uns

# General metadata naming rules (schema "General Requirements").
# Enforced by metadata.other.* checks and MetadataGeneralValidator.
metadata_rules:
  forbidden_name_prefix: "__"
  skip_column_names: [_index, index, __categories]
  unique_layers: [obs, var]
  unique_names_requirement: 'Metadata field names must be unique'
  deprecated_names:
    - name: organism
      layer: obs
      deprecated_in: "6.0.0"
    - name: organism_ontology_term_id
      layer: obs
      deprecated_in: "6.0.0"
    - name: ethnicity
      layer: obs
      deprecated_in: "3.0.0"
    - name: ethnicity_ontology_term_id
      layer: obs
      deprecated_in: "3.0.0"
    - name: X_normalization
      layer: uns
      deprecated_in: "3.0.0"
    - name: default_field
      layer: uns
      deprecated_in: "2.0.0"
    - name: layer_descriptions
      layer: uns
      deprecated_in: "2.0.0"
    - name: tags
      layer: uns
      deprecated_in: "2.0.0"
    - name: version
      layer: uns
      deprecated_in: "2.0.0"
    - name: contributors
      layer: uns
      deprecated_in: "1.1.0"
    - name: preprint_doi
      layer: uns
      deprecated_in: "1.1.0"
    - name: project_description
      layer: uns
      deprecated_in: "1.1.0"
    - name: project_links
      layer: uns
      deprecated_in: "1.1.0"
    - name: project_name
      layer: uns
      deprecated_in: "1.1.0"
    - name: publication_doi
      layer: uns
      deprecated_in: "1.1.0"

# Columns that must be present in each AnnData layer.
# obs: per-cell metadata (ontology IDs listed together with their paired label columns).
# uns: dataset-level metadata in uns (H5AD) or /attrs (Loom).
# var: per-gene metadata in var (H5AD) or /row_attrs (Loom).
# Presence is checked under obs.required_presence, uns.required_presence, var.required.
required:
  obs:
    # Ontology term ID + human-readable label pairs (label consistency: label_pairs).
    - assay_ontology_term_id
    - assay
    - cell_type_ontology_term_id
    - cell_type
    - development_stage_ontology_term_id
    - development_stage
    - disease_ontology_term_id
    - disease
    - self_reported_ethnicity_ontology_term_id
    - self_reported_ethnicity
    - sex_ontology_term_id
    - sex
    - tissue_ontology_term_id
    - tissue
    # Non-ontology categorical / identifier fields.
    - donor_id
    - is_primary_data
    - suspension_type
    - tissue_type
  uns:
    - title
    - organism_ontology_term_id
    - organism
    - schema_version
    - schema_reference
    - ensembl_release
    - ensembl_database
    - ensembl_assembly
  var:
    - feature_is_filtered
    - feature_biotype
    - feature_length
    - feature_name
    - feature_reference
    - feature_type
    - feature_chromosome

# AnnData DataFrame indices (schema object model). @ separates layer from index attribute;
# / in h5ad.path is the on-disk HDF5 location (not a metadata column).
# Validated under var.index / obs index checks, separate from var.required columns.
anndata_indices:
  var:
    schema: var.index
    description: Feature identifiers (AnnData var_names); Ensembl gene_id or ERCC spike-in.
    h5ad:
      logical: var@_index
      path: var/_index
      storage_keys: [_index, index]
    loom:
      logical: /row_attrs@feature_id
      path: /row_attrs/feature_id
      storage_keys: [feature_id, index, _index]
      manifest_key: var_index_key
    validation:
      ensembl_prefix: ENS
      covid_organism_term: NCBITaxon:2697049
  obs:
    schema: obs.index
    description: Cell observation identifiers (AnnData obs_names).
    h5ad:
      path: obs/_index
      storage_keys: [_index, index]
    loom:
      path: /col_attrs/CellID
      storage_keys: []
      manifest_key: obs_index_key

# Closed value sets for named metadata columns.
# Each key is a column name; values must be one of the listed strings.
# Used by enum validators and check_detail_builder (not the same as constants:).
enum_fields:
  tissue_type:
    values:
      - tissue
      - organoid
      - cell line
      - primary cell culture
  suspension_type:
    values:
      - cell
      - nucleus
      - na
  feature_biotype:
    values:
      - gene
      - spike-in
  perturbation_types:
    values:
      - chemical
      - diet
      - genetic
      - protein
      - temperature

# Per-field constraint rows shown in compliance check detail popups
# (label + value/values pairs). Complements field_summaries and layer_field_checks.
field_constraints:
  uns:
    ensembl_release:
      - label: Requirement
        value: 'Positive integer (e.g. 115)'
    ensembl_assembly:
      - label: Requirement
        value: 'Non-empty assembly name string (e.g. GRCh38.p14)'
    organism:
      - label: Requirement
        value: 'Label must match the canonical organism name for the NCBITaxon term'
  var:
    feature_is_filtered:
      - label: Allowed values
        values: [true, false, True, False]
    feature_length:
      - label: Requirement
        value: 'Positive integer (uint)'
    feature_name:
      - label: Spike-in format
        value: 'ERCC-<digits> (spike-in control)'
      - label: Gene rule
        value: 'gene_name from reference for var index, or var index when absent'
    feature_type:
      - label: Requirement
        value: 'Non-empty string per gene or feature'
    feature_chromosome:
      - label: Requirement
        value: 'Non-empty string per gene or feature'

# UI constraint text for ontology.semantics.* subcheck types in check detail popups.
ontology_semantics_display:
  allowed_terms:
    constraints:
      - label: Requirement
        value: 'Each term must resolve as an active (non-obsolete) entry in the ontology database'
      - label: Obsolete terms
        value: 'Treated as not found (fail this check)'
  special_values:
    constraints:
      - label: Requirement
        value: 'Placeholder values allowed instead of a real ontology term.'
  label_pair:
    constraints:
      - label: Requirement
        value: 'Each label must match the canonical name of its ontology term ID'
  sorted_multi:
    constraints:
      - label: Requirement
        value: 'Values must be unique and sorted lexically, joined with " || "'
  organism_specific:
    self_reported_ethnicity_ontology_term_id:
      _missing_organism:
        - label: Organism-specific rules
          context: not_applicable_no_organism
      _default:
        human:
          - label: Organism-specific rules
            context: applicable_human_ethnicity
          - from_file: true
          - label: Requirement
            value: 'Must not be "na"; use HANCESTRO/AfPO terms or allowed special values'
        non_human:
          - label: Organism-specific rules
            context: applicable_non_human_ethnicity
          - from_file: true
          - label: Requirement
            value: 'self_reported_ethnicity_ontology_term_id must be "na"'
      special_values:
        human:
          - label: Organism-specific rules
            context: applicable_human_ethnicity
          - from_file: true
          - label: Requirement
            value: '"na" is forbidden for Homo sapiens'
        non_human:
          - label: Organism-specific rules
            context: applicable_non_human_ethnicity
          - from_file: true
          - label: Requirement
            value: 'Only "na" is allowed for non-human datasets'

# Experimental condition extension (obs columns + perturbation_types enum).
# Validated by ExperimentalConditionValidator.
experimental_condition_rules:
  id_field: experimental_condition_ontology_term_id
  label_field: experimental_condition
  perturbation_types_field: perturbation_types
  genetic_perturbation_id_field: genetic_perturbation_id
  na_value: na
  no_perturbations_value: no perturbations
  delimiter: " || "

# Ontology term string format (PREFIX:ID vs Cellosaurus CVCL_*).
# Used by ontology.format checks before database resolution.
ontology_term_formats:
  obo:
    pattern: '^[A-Za-z]+:\d+$'
    requirement: 'Terms must use OBO-style PREFIX:ID format (e.g. %{example})'
    example: 'CL:0000540'
    invalid_message: "Invalid ontology term format: '%{term}'. Expected OBO format (PREFIX:ID) like '%{example}'"
  cellosaurus:
    identifier_prefix: CVCL_
    requirement: 'CVCL_* with underscore separator (not PREFIX:ID)'
    example: CVCL_1P02
    disallowed_message: "Invalid ontology term format: '%{term}'. Cellosaurus CVCL_* terms are not allowed for this field."
  combined_requirement: 'Terms must use OBO-style PREFIX:ID (e.g. %{example}), or Cellosaurus CVCL_* identifiers (e.g. CVCL_1P02)'

# Per-field ontology configuration: allowed ID prefixes, special placeholders,
# banned terms, and fixed valid_terms maps. layer defaults to obs; uns for organism.
ontology_fields:
  assay_ontology_term_id:
    prefixes: [EFO]
    special_values: []
    format_example: EFO:0009899
  cell_type_ontology_term_id:
    prefixes: [CL, WBbt, ZFA, FBbt]
    special_values: [unknown, na]
    format_example: CL:0000540
    banned_terms:
      - CL:0000003
      - CL:0000255
      - CL:0000548
      - CL:0001035
  development_stage_ontology_term_id:
    prefixes: [HsapDv, MmusDv, WBls, ZFS, FBdv, UBERON]
    special_values: [unknown, na]
    format_example: HsapDv:0000095
  disease_ontology_term_id:
    prefixes: [MONDO, PATO]
    special_values: []
    format_example: MONDO:0000001
  sex_ontology_term_id:
    prefixes: [PATO]
    special_values: [unknown, na]
    format_example: PATO:0000384
    valid_terms:
      PATO:0000383: female
      PATO:0000384: male
      PATO:0001340: hermaphrodite
      PATO:0001894: intersex
  tissue_ontology_term_id:
    prefixes: [UBERON, CVCL, WBbt, ZFA, FBbt]
    special_values: []
    format_example: UBERON:0002048
  self_reported_ethnicity_ontology_term_id:
    prefixes: [HANCESTRO, AfPO]
    special_values: [unknown, na, multiethnic]
    format_example: HANCESTRO:0005
  organism_ontology_term_id:
    layer: uns
    prefixes: [NCBITaxon]
    special_values: []
    format_example: NCBITaxon:9606

# Shared reference data for validators (not keyed as "column X allowed values").
# visium_assay_terms / slide_seq_assay: spatial assay detection (SpatialAssayHelper).
# ensembl_database_values: allowed uns/ensembl_database strings.
# feature_reference_taxa: pinned NCBITaxon IDs for var/feature_reference.
constants:
  # Known Visium EFO assay terms (fast path; descendants of EFO:0010961 also match).
  visium_assay_terms:
    - EFO:0010961
    - EFO:0022857
    - EFO:0022859
    - EFO:0022860
  slide_seq_assay: EFO:0030062
  ensembl_database_values:
    - Ensembl
    - EnsemblMetazoa
    - EnsemblCOVID-19
  feature_reference_taxa:
    NCBITaxon:6293: Caenorhabditis elegans
    NCBITaxon:9483: Callithrix jacchus
    NCBITaxon:7955: Danio rerio
    NCBITaxon:7227: Drosophila melanogaster
    NCBITaxon:9595: Gorilla gorilla gorilla
    NCBITaxon:9606: Homo sapiens
    NCBITaxon:9541: Macaca fascicularis
    NCBITaxon:9544: Macaca mulatta
    NCBITaxon:30608: Microcebus murinus
    NCBITaxon:10090: Mus musculus
    NCBITaxon:9986: Oryctolagus cuniculus
    NCBITaxon:9598: Pan troglodytes
    NCBITaxon:10116: Rattus norvegicus
    NCBITaxon:2697049: SARS-CoV-2
    NCBITaxon:9823: Sus scrofa
    NCBITaxon:32630: ERCC Spike-Ins

# Spatial transcriptomics extension (uns/spatial, Visium obs columns, image assets).
# Validated under extension.spatial.* categories.
spatial_extension:
  root_scalar_key: is_single
  library:
    allowed_keys: [images, scalefactors]
    required_when_visium_is_single: [images, scalefactors]
  images:
    allowed_keys: [hires, fullres]
    required_when_visium_is_single: [hires]
    array:
      dtype: uint8
      ndim: 3
      channel_sizes: [3, 4]
    hires_max_dimension:
      EFO:0022860: 4000
      default: 2000
  obsm_spatial:
    h5ad_key: obsm/spatial
    loom_key: /col_attrs/spatial
    min_columns: 2
    dtype_kinds: [f, i, u]
    required_when_is_single: true
  scalefactors:
    allowed_keys: [spot_diameter_fullres, tissue_hires_scalef]
    required_when_visium_is_single: [spot_diameter_fullres, tissue_hires_scalef]
  obs:
    required_columns: [array_row, array_col, in_tissue]
    condition: 'Visium assay with spatial.is_single=true'
  display:
    rollup_sub_checks: 'structure, obs, assets'
    hires_max_dimension_template: '%{default} px (CytAssist 11mm %{assay}: %{cytassist} px)'

# Genetic perturbation extension (schema_perturb.md). Validated under extension.perturb.*.
perturb_extension:
  obs_fields:
    - genetic_perturbation_id
    - genetic_perturbation_strategy
  uns_root_key: genetic_perturbations
  allowed_organisms:
    - NCBITaxon:7955
    - NCBITaxon:9606
    - NCBITaxon:10090
  strategy_values:
    - control
    - CRISPR activation screen
    - CRISPR interference screen
    - CRISPR knockout mutant
    - CRISPR knockout screen
  strategy_no_perturbations: no perturbations
  role_values:
    - control
    - targeting
  perturbation_entry_keys:
    curator_required:
      - role
      - protospacer_sequence
      - protospacer_adjacent_motif
    optional:
      - derived_genomic_regions
      - derived_features
  id_delimiter: " || "

# Per-field ontology semantic constraints (roots, forbidden branches, allowed_exact).
# Drives ontology.semantics.* checks; complements ontology_fields prefixes/format.
semantic_rules:
  assay_ontology_term_id:
    any_roots: [EFO:0002772, EFO:0010183]
    forbidden_exact: [EFO:0010961]
  cell_type_ontology_term_id:
    any_roots: [CL:0000000]
    forbidden_branches: [WBbt:0006803]
    allowed_special_values: [na, unknown]
  development_stage_ontology_term_id:
    any_roots: [UBERON:0000105]
    forbidden_branches: [UBERON:0000071]
    allowed_special_values: [na, unknown]
  tissue_ontology_term_id:
    any_roots: [UBERON:0001062]
  disease_ontology_term_id:
    any_roots: [MONDO:0000001, MONDO:0021178]
    allowed_exact: [PATO:0000461]
  self_reported_ethnicity_ontology_term_id:
    any_roots: [HANCESTRO:0601, HANCESTRO:0602]
    sorted_multi: true
    allowed_special_values: [na, unknown, multiethnic]

# Maps each *_ontology_term_id column to its human-readable label column.
# ID/label consistency is validated under obs.label_pairs (and uns for organism).
label_pairs:
  assay_ontology_term_id: assay
  cell_type_ontology_term_id: cell_type
  development_stage_ontology_term_id: development_stage
  disease_ontology_term_id: disease
  self_reported_ethnicity_ontology_term_id: self_reported_ethnicity
  sex_ontology_term_id: sex
  tissue_ontology_term_id: tissue
  organism_ontology_term_id: organism

# Messages and display metadata for ObsLabelPairConstraintEvaluator.
label_pair_validation:
  check_prefix: obs.label_pairs
  organism_id_field: organism_ontology_term_id
  messages:
    pass: '%{id_path} and %{label_path} are consistent'
    skipped: 'Not applicable (%{id_path} not present)'
    fail_missing_label: 'Paired label column %{label_path} is required when %{id_path} is present'
    fail_count_mismatch: '%{id_path} and %{label_path} must contain the same number of " || "-separated values'
    fail_special_mismatch: 'Label must match special ontology id value -- expected %{id_val}, got %{label_val}'
    fail_mismatch: "ID/label mismatch for %{id_val}: expected '%{expected}', got '%{label_val}'"
  display:
    category_label: 'Observation label / ontology ID pairs'
    category_summary: 'Each obs ontology term ID field listed in label_pairs must have a consistent paired label column.'
    pair_title_template: '%{label_field} / %{id_field}'
    pair_summary_template: 'The %{label_field} label must be present and match %{id_field} (including special placeholder values).'

# Cross-field rules: constraints that depend on values in two or more metadata fields.
# Reference data (maps, organism prefixes) lives here; executable rule definitions
# are under validation.rules (CF-1 .. CF-9).
cross_field:
  # EFO assay terms used to resolve suspension_type when exact map key is missing.
  assay_ancestor_terms:
    - EFO:0030080
    - EFO:0007045
    - EFO:0002761
    - EFO:0008919
    - EFO:0010184
    - EFO:0008994
  # CF-1: assay_ontology_term_id -> allowed suspension_type values.
  assay_suspension_type_map:
    EFO:0700004: [cell]
    EFO:0700003: [cell]
    EFO:0010010: [cell, nucleus]
    EFO:0008720: [nucleus]
    EFO:0008722: [cell, nucleus]
    EFO:0700011: [cell, nucleus]
    EFO:0008780: [cell, nucleus]
    EFO:0008796: [cell]
    EFO:0030060: [cell, nucleus]
    EFO:0008992: [na]
    EFO:0030002: [cell]
    EFO:0008853: [cell]
    EFO:0022490: [cell, nucleus]
    EFO:0030026: [nucleus]
    EFO:0010550: [cell, nucleus]
    EFO:0030028: [cell, nucleus]
    EFO:0008953: [cell]
    EFO:0700010: [cell, nucleus]
    EFO:0009919: [cell, nucleus]
    EFO:0009899: [cell, nucleus]
    EFO:0009922: [cell, nucleus]
    EFO:0022604: [cell, nucleus]
    EFO:0011025: [cell, nucleus]
    EFO:0009900: [cell, nucleus]
    EFO:0022605: [cell, nucleus]
    EFO:0030059: [cell, nucleus]
    EFO:0008931: [cell, nucleus]
    EFO:0010891: [nucleus]
    EFO:0010961: [na]
    EFO:0022857: [na]
    EFO:0022859: [na]
    EFO:0022860: [na]
    EFO:0030062: [na]
    EFO:0030080: [cell, nucleus]
    EFO:0007045: [nucleus]
    EFO:0002761: [nucleus]
    EFO:0008919: [cell]
    EFO:0010184: [cell, nucleus]
    EFO:0008994: [na]
  # Values forced when tissue_type is "cell line" (compliance fix form + CF-2a-2f).
  cell_line_forced_fields:
    - field: self_reported_ethnicity_ontology_term_id
      value: na
      label_field: self_reported_ethnicity
      label_value: na
    - field: sex_ontology_term_id
      value: na
      label_field: sex
      label_value: na
    - field: development_stage_ontology_term_id
      value: unknown
      label_field: development_stage
      label_value: unknown
    - field: donor_id
      value: na
    - field: suspension_type
      value: na
  # Organism -> development stage ontology prefix (ontology.organism_specific.development_stage).
  organism_dev_stage_mapping:
    NCBITaxon:9606: HsapDv
    NCBITaxon:10090: MmusDv
    NCBITaxon:6239: WBls
    NCBITaxon:7955: ZFS
    NCBITaxon:7227: FBdv
  organism_cell_type_prefixes:
    NCBITaxon:6239: [CL, WBbt]
    NCBITaxon:7955: [CL, ZFA]
    NCBITaxon:7227: [CL, FBbt]
  organism_cell_type_default_prefixes: [CL]
  organism_tissue_prefixes:
    NCBITaxon:6239: [UBERON, WBbt]
    NCBITaxon:7955: [UBERON, ZFA]
    NCBITaxon:7227: [UBERON, FBbt]
  organism_tissue_default_prefixes: [UBERON]
  organism_ethnicity_human: NCBITaxon:9606
  organism_ethnicity_prefixes: [HANCESTRO, AfPO]
  organism_ethnicity_special_values: [unknown, na, multiethnic]
  organism_celegans_sex_organism: NCBITaxon:6239
  organism_celegans_sex_terms: [PATO:0000384, PATO:0001340]
  # Cross-field rule engine: shared messages, report grouper regex, and CF-* definitions.
  # Each CF rule may define: token, mapping, violation (template), messages, checks.
  # Violations are emitted by ScfairSchemaRules#check_cross_field_constraints;
  # CrossFieldConstraintEvaluator turns them into report items and rule_checks.
  validation:
    # Shown when a conditional CF rule does not apply (e.g. CF-4 when not organoid).
    not_applicable: 'Not applicable'
    # Template for CF-2a-2f when tissue_type is not "cell line"; %{detail} from skip_detail.
    skip_not_cell_line_template: 'Not applicable (tissue_type is not "cell line"). For cell lines only: %{detail}'
    # Regex: routes obs/var field messages to cross-field.constraints in ComplianceReportGrouper.
    grouper_message_pattern: 'MUST|must not|must be|For assay|tissue_type is|Organism is|Organoid|Visium|C\. elegans|spatial\.is_single|Label must match special ontology id'
    rules:
      CF-1:
        slug: assay-suspension
        title: 'CF-1: Assay and suspension_type'
        summary: 'suspension_type must be consistent with assay_ontology_term_id according to the schema assay map.'
        checks:
          - 'Looks up assay_ontology_term_id in the schema assay to suspension_type map'
          - 'Falls back to ancestor assay terms when an exact map entry is missing'
          - 'Fails when suspension_type is not one of the allowed values for the assay'
        token: suspension_type
        messages:
          pass: 'Assay/suspension_type consistency'
          fail: 'Assay/suspension_type consistency'
        violation:
          field: suspension_type
          severity: error
          template: 'For assay %{assay}, suspension_type MUST be one of: %{allowed}. Got "%{value}".'
      CF-2a:
        slug: cell-line-ethnicity
        title: 'CF-2a: Cell line ethnicity'
        summary: 'When tissue_type is "cell line", self_reported_ethnicity_ontology_term_id must be "na".'
        token: self_reported_ethnicity_ontology_term_id
        messages:
          skip_detail: 'ethnicity must be "na" (cell lines have no donor ancestry)'
          pass: 'self_reported_ethnicity_ontology_term_id is "na"'
          fail: 'self_reported_ethnicity_ontology_term_id must be "na" for cell lines'
        violation:
          field: self_reported_ethnicity_ontology_term_id
          severity: error
          template: 'tissue_type is "cell line" -- self_reported_ethnicity_ontology_term_id MUST be "na", got "%{value}".'
      CF-2b:
        slug: cell-line-sex
        title: 'CF-2b: Cell line sex'
        summary: 'When tissue_type is "cell line", sex_ontology_term_id must be "na".'
        token: sex_ontology_term_id
        messages:
          skip_detail: 'sex must be "na" (not applicable to a cultured line)'
          pass: 'sex_ontology_term_id is "na"'
          fail: 'sex_ontology_term_id must be "na" for cell lines'
        violation:
          field: sex_ontology_term_id
          severity: error
          template: 'tissue_type is "cell line" -- sex_ontology_term_id MUST be "na", got "%{value}".'
      CF-2c:
        slug: cell-line-development-stage
        title: 'CF-2c: Cell line development stage'
        summary: 'When tissue_type is "cell line", development_stage_ontology_term_id must be "unknown".'
        token: development_stage_ontology_term_id
        messages:
          skip_detail: 'development_stage must be "unknown" (no in vivo stage for a line)'
          pass: 'development_stage_ontology_term_id is "unknown"'
          fail: 'development_stage_ontology_term_id must be "unknown" for cell lines'
        violation:
          field: development_stage_ontology_term_id
          severity: error
          template: 'tissue_type is "cell line" -- development_stage_ontology_term_id MUST be "unknown", got "%{value}".'
      CF-2d:
        slug: cell-line-donor-id
        title: 'CF-2d: Cell line donor_id'
        summary: 'When tissue_type is "cell line", donor_id must be "na".'
        token: donor_id
        messages:
          skip_detail: 'donor_id must be "na" (line identity is not a donor ID)'
          pass: 'donor_id is "na"'
          fail: 'donor_id must be "na" for cell lines'
        violation:
          field: donor_id
          severity: error
          template: 'tissue_type is "cell line" -- donor_id MUST be "na", got "%{value}".'
      CF-2e:
        slug: cell-line-suspension
        title: 'CF-2e: Cell line suspension_type'
        summary: 'When tissue_type is "cell line", suspension_type must be "na".'
        token: suspension_type
        messages:
          skip_detail: 'suspension_type must be "na" (not used for cell line profiles)'
          pass: 'suspension_type is "na"'
          fail: 'suspension_type must be "na" for cell lines'
        violation:
          field: suspension_type
          severity: error
          template: 'tissue_type is "cell line" -- suspension_type MUST be "na", got "%{value}".'
      CF-2f:
        slug: cell-line-tissue-id
        title: 'CF-2f: Cell line tissue identifier'
        summary: 'When tissue_type is "cell line", tissue_ontology_term_id should be a Cellosaurus term (CVCL_*).'
        token: tissue_ontology_term_id
        messages:
          skip_detail: 'tissue_ontology_term_id should be a Cellosaurus ID (CVCL_*) naming the line'
          pass: 'tissue_ontology_term_id is a Cellosaurus term (CVCL_*)'
          fail: 'tissue_ontology_term_id should be a Cellosaurus term (CVCL_*) for cell lines'
        violation:
          field: tissue_ontology_term_id
          severity: warning
          template: 'tissue_type is "cell line" -- tissue_ontology_term_id SHOULD be a Cellosaurus term (CVCL_*), got "%{value}".'
      CF-3:
        slug: donor-id
        title: 'CF-3: donor_id consistency'
        summary: 'donor_id must not be "na" unless tissue_type is "cell line".'
        checks:
          - 'Reads tissue_type and donor_id from observation metadata'
          - 'Fails when donor_id is "na" and tissue_type is not "cell line"'
          - 'When tissue_type is "cell line", donor_id is validated under CF-2d instead'
        messages:
          pass: 'donor_id consistency OK'
          fail: 'donor_id must not be "na" unless tissue_type is "cell line"'
      CF-4:
        # Organoid: tissue_ontology_term_id must not be UBERON:0000922 (embryo).
        # forbidden_term in mapping is read by Rules.cross_field_organoid_embryo_term.
        slug: organoid-tissue
        title: 'CF-4: Organoid tissue constraint'
        summary: 'When tissue_type is "organoid", tissue_ontology_term_id must not be embryo (UBERON:0000922).'
        token: tissue_ontology_term_id
        checks:
          - 'Applies only when tissue_type is "organoid"'
          - 'Fails when tissue_ontology_term_id is embryo (UBERON:0000922)'
        mapping:
          applies_when:
            tissue_type: organoid
          field: tissue_ontology_term_id
          forbidden_term: UBERON:0000922
        messages:
          pass: 'Organoid tissue constraints OK'
          fail: 'Organoid tissue must not be embryo (UBERON:0000922)'
        violation:
          field: tissue_ontology_term_id
          severity: error
          template: 'tissue_type is "organoid" -- tissue_ontology_term_id MUST NOT be %{forbidden_term} (embryo), got "%{value}".'
      CF-5:
        slug: spatial-assay-uniformity
        title: 'CF-5: Spatial assay uniformity'
        summary: 'Spatial assay datasets (Visium, Slide-seq) must use a single assay value across all cells.'
        checks:
          - 'Runs when assay_ontology_term_id is a Visium descendant (EFO:0010961) or Slide-seqV2 (EFO:0030062)'
          - 'Collects all unique assay values in the dataset'
          - 'Fails if more than one distinct assay value is present while a spatial assay is detected'
        messages:
          pass: 'Spatial assay uniformity OK'
          fail: 'Spatial assay datasets must use a single assay value'
      CF-6:
        slug: spatial-primary-data
        title: 'CF-6: Spatial is_primary_data'
        summary: 'When spatial.is_single is false, is_primary_data must be false.'
        checks:
          - 'Reads spatial.is_single from uns/spatial (H5AD) or /attrs/spatial/is_single (Loom)'
          - 'Compares against is_primary_data on each observation'
          - 'Fails when is_single is false and is_primary_data is true'
        messages:
          pass: 'Spatial primary-data constraint OK'
          fail: 'is_primary_data must be false when spatial.is_single is false'
      CF-7:
        slug: cell-line-cell-type
        title: 'CF-7: Cell line cell type'
        summary: 'When tissue_type is "cell line", cell_type_ontology_term_id should be "na" or "unknown".'
        checks:
          - 'Applies only when tissue_type is "cell line"'
          - 'Fails when cell_type_ontology_term_id is a real ontology term other than na or unknown'
        messages:
          pass: 'Cell line cell_type constraint OK'
          fail: 'cell_type_ontology_term_id should be na/unknown for cell lines'
      CF-8:
        slug: visium-in-tissue
        title: 'CF-8: Visium in_tissue spots'
        summary: 'When spatial.is_single is true, Visium spots with in_tissue=0 must use cell_type_ontology_term_id=unknown.'
        checks:
          - 'Applies to Visium assays when spatial.is_single is true'
          - 'Requires in_tissue observation metadata to be present'
          - 'When all spots are out of tissue (in_tissue=0 only), cell_type_ontology_term_id must be unknown'
          - 'Skipped when in_tissue mixes 0 and 1 (per-spot pairing not available in metadata summary)'
        messages:
          skipped_not_visium: 'Not applicable'
          skipped_not_single: 'Not applicable (requires spatial.is_single=true)'
          skipped_no_in_tissue: 'Not applicable (in_tissue not present)'
          skipped_mixed_in_tissue: 'Per-spot in_tissue/cell_type pairing not available in metadata summary'
          pass: 'Visium in_tissue constraint OK'
          fail: 'Visium spots with in_tissue=0 must use cell_type_ontology_term_id=unknown'
      CF-9:
        slug: spatial-metadata-presence
        title: 'CF-9: Spatial metadata presence'
        summary: 'uns/spatial (or /attrs/spatial on Loom) must be present for Visium or Slide-seqV2 assays and absent otherwise.'
        checks:
          - 'Reads assay_ontology_term_id and checks for Visium (EFO:0010961 descendants) or Slide-seqV2 (EFO:0030062)'
          - 'Detects spatial metadata from keys under uns/spatial or /attrs/spatial'
          - 'Fails when spatial metadata is present but the assay is not spatial'
          - 'Fails when the assay is spatial but spatial metadata is missing'
        messages:
          fail_metadata_without_spatial_assay: '%{spatial_root} must not be present unless assay is Visium or Slide-seqV2'
          fail_missing_metadata: 'Missing %{spatial_root} metadata (required for spatial assays)'
          pass: 'Spatial metadata presence consistent with assay'

# Organism-specific ontology prefix rules (depends on uns/organism_ontology_term_id).
# Evaluated by OrganismSpecificConstraintEvaluator; UI text in organism_specific_display.
organism_specific_validation:
  check_prefix: ontology.organism_specific
  special_values:
    cell_type: [unknown, na]
    development_stage: [unknown, na]
    sex: [unknown, na]
  skip_messages:
    development_stage:
      no_mapping: 'No mapped development stage prefix for this organism'
      field_missing: 'development_stage_ontology_term_id not present'
    cell_type:
      organism_missing: 'organism_ontology_term_id not set'
      field_missing: 'cell_type_ontology_term_id not present'
    tissue:
      field_missing: 'tissue_ontology_term_id not present'
      organism_missing: 'organism_ontology_term_id not set'
      primary_cell_culture: 'Uses cell_type_ontology_term_id rules for primary cell culture (see cell type check)'
    ethnicity:
      field_missing: 'self_reported_ethnicity_ontology_term_id not present'
      cell_line: 'Cell line ethnicity is validated under cross-field rule CF-2a'
      organism_missing: 'organism_ontology_term_id not set'
    sex:
      organism_missing: 'organism_ontology_term_id not set'
      not_celegans: 'Not applicable (C. elegans sex constraint only)'
      field_missing: 'sex_ontology_term_id not present'
  pass_messages:
    prefix_satisfied: '%{label} organism-specific constraints satisfied'
    cell_line_tissue: 'Cell line tissue_ontology_term_id uses Cellosaurus (CVCL_*) terms'
    non_human_ethnicity: 'Non-human dataset: self_reported_ethnicity_ontology_term_id is "na"'
    human_ethnicity: 'Human ethnicity constraints satisfied'
    celegans_sex: 'C. elegans sex constraints satisfied'
  fail_messages:
    check_failed: '%{label} organism-specific constraints failed'
    prefix_invalid_template: 'Expected %{prefix_list} for organism %{organism}%{special_note}; invalid: %{invalid}'
    cell_line_tissue_template: 'Cell line tissue_ontology_term_id must use Cellosaurus CVCL_* terms; invalid: %{invalid}'
    human_ethnicity_na: 'Homo sapiens dataset: self_reported_ethnicity_ontology_term_id must not be "na" (use HANCESTRO/AfPO, "unknown", or "multiethnic")'
    non_human_ethnicity_template: 'Non-human dataset: self_reported_ethnicity_ontology_term_id must be "na"; invalid: %{invalid}'
    celegans_sex_template: 'C. elegans sex_ontology_term_id must be PATO:0000384 (male), PATO:0001340 (hermaphrodite), unknown, or na; invalid: %{invalid}'
  prefix_list_entry: '%{prefix}:*'
  prefix_list_joiner: ' or '
  special_note_template: ' (special values %{values} also allowed)'
  cell_line_tissue_type: 'cell line'
  primary_cell_culture_tissue_type: 'primary cell culture'
  cellosaurus_prefix: CVCL_

# Display strings for organism-specific constraint rows in check detail popups.
organism_specific_display:
  file_organism:
