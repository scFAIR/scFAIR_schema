    interaction_semantic_cell_type: 'Prefix requirements apply in addition to descendant, banned-term, and other semantic constraints above'
    schema_note_cell_type: 'For this organism, scFAIR expects CL terms or taxon-neutral descendants of CL:0000000'
    prefix_status_dev_stage_unexpected: 'Not satisfied — unexpected terms: %{terms}'
    prefix_status_dev_stage_satisfied: 'Satisfied by current development_stage_ontology_term_id values'
    prefix_status_cell_type_unexpected: 'Not satisfied — unexpected terms: %{terms}'
    prefix_status_cell_type_satisfied: 'Satisfied by current cell_type_ontology_term_id values'
    prefix_status_tissue_unexpected: 'Not satisfied — unexpected terms: %{terms}'
    prefix_status_tissue_satisfied: 'Satisfied by current tissue_ontology_term_id values'

# Unified compliance check registry: categories as shown in the compliance report UI.
# Each category has metadata (label, summary, rollup, messages) and optional nested checks.
# Omit formats to apply to both h5ad and loom; set formats only for format-specific categories.
# checks.catalog lists sidebar category ids per file format.
# checks._defaults provides fallback popup summary templates.
checks:
  catalog:
    common:
    - obs.label_pairs
    - obs.required_presence
    - uns.required_presence
    - schema.version
    - schema.reference
    - uns.ensembl_assembly
    - uns.ensembl
    - obs.experimental_condition
    - var.required
    - var.index
    - var.cross_field
    - cross-field.uns_ensembl
    - ontology.format
    - cross-field.constraints
    - ontology.database_resolution
    - ontology.organism_specific
    - ontology.semantics
    - extension.spatial
    - extension.perturb
    - extension.atac
    - extension.analysis_json
    - metadata.other
    loom_only:
    - loom.structure
    - loom.embeddings
    - loom.matrix_encoding
    - loom.mapping_manifest
    h5ad_only:
    - h5ad.structure
    - h5ad.embeddings
    - h5ad.matrix_encoding
  obs.label_pairs:
    label: Observation label / ontology ID pairs
    summary: Observation ontology term IDs must have consistent paired label columns
      (from label_pairs).
    rollup:
    - One check per obs entry in label_pairs (except organism, validated separately
      in uns)
    - Paired label column must be present when the ontology ID column is present
    - Special placeholder IDs must match the label exactly
    - Real ontology terms must match the authorised label from the ontology database
    - Multi-value fields use row-aligned obs/{id}#label_pairs extraction when available
  obs.required_presence:
    label: Required observation metadata fields
    summary: Required per-cell observation metadata fields defined by scFAIR 7.1.0.
    messages:
      found: Found %{path} metadata
      missing: Missing %{path} metadata (required by schema)
      missing_cell_id: Missing %{path} metadata (unique cell identifiers required)
      skipped_pre_analysis: Skipped (pre-analysis dataset)
      missing_visium: Missing %{path} metadata (required for Visium spatial data with
        is_single=true)
    rollup:
    - Each required observation (obs / col_attrs) column from scFAIR 7.1.0 is present
    - 'Ontology term ID and paired label fields: assay, cell_type, disease, development_stage,
      sex, tissue, ethnicity'
    - 'Categorical fields: tissue_type, suspension_type, donor_id, is_primary_data'
    - ID/label consistency for ontology fields is validated under obs.label_pairs
      (derived from label_pairs)
    checks:
      assay_ontology_term_id:
        layer: obs
        field: assay_ontology_term_id
        checks_performed:
        - Verifies required observation column %{path} is present
      cell_type_ontology_term_id:
        layer: obs
        field: cell_type_ontology_term_id
        checks_performed:
        - Verifies required observation column %{path} is present
      development_stage_ontology_term_id:
        layer: obs
        field: development_stage_ontology_term_id
        checks_performed:
        - Verifies required observation column %{path} is present
      disease_ontology_term_id:
        layer: obs
        field: disease_ontology_term_id
        checks_performed:
        - Verifies required observation column %{path} is present
      self_reported_ethnicity_ontology_term_id:
        layer: obs
        field: self_reported_ethnicity_ontology_term_id
        checks_performed:
        - Verifies required observation column %{path} is present
      sex_ontology_term_id:
        layer: obs
        field: sex_ontology_term_id
        checks_performed:
        - Verifies required observation column %{path} is present
      tissue_ontology_term_id:
        layer: obs
        field: tissue_ontology_term_id
        checks_performed:
        - Verifies required observation column %{path} is present
      donor_id:
        layer: obs
        field: donor_id
        checks_performed:
        - Verifies required observation column %{path} is present
      is_primary_data:
        layer: obs
        field: is_primary_data
        checks_performed:
        - Verifies required observation column %{path} is present
      suspension_type:
        layer: obs
        field: suspension_type
        checks_performed:
        - Verifies required observation column %{path} is present
        - 'Values must be one of: %{allowed_values}'
      tissue_type:
        layer: obs
        field: tissue_type
        checks_performed:
        - Verifies required observation column %{path} is present
        - 'Values must be one of: %{allowed_values}'
  uns.required_presence:
    label: Required dataset metadata fields
    summary: Required dataset-level metadata fields in uns/attrs.
    messages:
      found: Found %{path} metadata
      missing: Missing %{path} metadata (required by schema)
    rollup:
    - Each required dataset metadata field is validated individually
    - 'Fields: title, organism_ontology_term_id, organism, schema_version, schema_reference,
      ensembl_release, ensembl_database, ensembl_assembly'
    - Open a specific field check for presence requirements
    checks:
      title:
        layer: uns
        field: title
        checks_performed:
        - Field must be present in uns (H5AD) or /attrs (Loom)
        - Short human-readable dataset title required by scFAIR
        summary: Short human-readable dataset title required in uns metadata.
      organism_ontology_term_id:
        layer: uns
        field: organism_ontology_term_id
        checks_performed:
        - Field must be present in uns (H5AD) or /attrs (Loom)
        - Must use NCBITaxon:tax_id format for the dataset species
        - Validated for ontology format and semantic constraints when values are present
        summary: Species ontology term (NCBITaxon:tax_id) identifying the dataset
          organism.
      organism:
        layer: uns
        field: organism
        checks_performed:
        - Field must be present in uns (H5AD) or /attrs (Loom)
        - Human-readable organism label paired with organism_ontology_term_id
        - Label must match the organism name for the declared NCBITaxon term
        summary: Human-readable organism name label paired with organism_ontology_term_id.
      schema_version:
        layer: uns
        field: schema_version
        checks_performed:
        - Field must be present in uns (H5AD) or /attrs (Loom)
        - Must be compatible with the reference scFAIR schema version
        summary: Schema version identifier; must be compatible with scFAIR %{schema_version}.
      schema_reference:
        layer: uns
        field: schema_reference
        checks_performed:
        - Field must be present in uns (H5AD) or /attrs (Loom)
        - Must match the canonical schema URL for this validator release
        summary: Canonical URL of the scFAIR schema this file claims to follow.
      ensembl_release:
        layer: uns
        field: ensembl_release
        checks_performed:
        - Field must be present in uns (H5AD) or /attrs (Loom)
        - Must be a positive integer Ensembl release number
        summary: Ensembl release number used for gene annotation (positive integer).
      ensembl_database:
        layer: uns
        field: ensembl_database
        checks_performed:
        - Field must be present in uns (H5AD) or /attrs (Loom)
        - Must be one of the schema Ensembl database enum values
        summary: Ensembl database source used for gene annotation (Ensembl, EnsemblMetazoa,
          or EnsemblCOVID-19).
      ensembl_assembly:
        layer: uns
        field: ensembl_assembly
        checks_performed:
        - Field must be present in uns (H5AD) or /attrs (Loom)
        - Must be a non-empty assembly name string
        summary: Genome assembly name for the Ensembl annotation (e.g. GRCh38.p14).
  schema.version:
    label: Schema version compatibility
    summary: The file schema_version must be compatible with the reference schema
      version.
    rollup:
    - Reads schema_version from uns/attrs
    - Compares major.minor version against the reference scFAIR release
    - Accepts compatible schema_version identifiers (e.g. 7.1.0_scfair)
  schema.reference:
    label: Schema reference URL
    summary: The file schema_reference should match the canonical URL of the reference
      schema.
    rollup:
    - Reads schema_reference from uns (H5AD) or /attrs (Loom)
    - Compares against the canonical schema URL for this validator release
    - Warns when the URL does not match exactly
  uns.ensembl_assembly:
    label: Ensembl assembly metadata
  uns.ensembl:
    label: Ensembl gene annotation metadata
    summary: Ensembl release, database, and assembly used for gene annotation.
    rollup:
    - Each Ensembl metadata field is validated individually
    - Open a specific field check for presence and value constraints
  obs.experimental_condition:
    label: Experimental condition metadata
    summary: Experimental condition ontology IDs, labels, and perturbation types.
    rollup:
    - experimental_condition_ontology_term_id must be absent when all observations
      are na
    - experimental_condition label required when the ID column is present
    - perturbation_types required when experimental_condition or genetic_perturbation_id
      is present
    - Multi-values must be unique and sorted lexically with " || " delimiter
  var.required:
    label: Gene (var) metadata fields
    summary: Required per-gene metadata columns in var / row_attrs.
    messages:
      found: Found %{path} metadata
      missing: Missing %{path} metadata (required by schema)
    rollup:
    - Each required var / row_attrs column is validated individually
    - Open a specific field check for column presence and value constraints
    checks:
      feature_is_filtered:
        layer: var
        field: feature_is_filtered
        checks_performed:
        - Column must be present in var (H5AD) or row_attrs (Loom)
        - Values must be boolean true or false (true, false, True, or False)
        summary: Per-gene filter flag indicating whether the feature was filtered
          out of the matrix.
      feature_biotype:
        layer: var
        field: feature_biotype
        checks_performed:
        - Column must be present in var (H5AD) or row_attrs (Loom)
        - Values must be one of the schema biotype enum values
        summary: 'Gene biotype: distinguishes annotated genes from ERCC spike-in controls.'
      feature_length:
        layer: var
        field: feature_length
        checks_performed:
        - Column must be present in var (H5AD) or row_attrs (Loom)
        - Values must be a positive integer (gene length in base pairs)
        summary: Gene length in base pairs as a positive integer.
      feature_name:
        layer: var
        field: feature_name
        checks_performed:
        - Column must be present in var (H5AD) or row_attrs (Loom)
        - 'Spike-in: "{ERCC-ID} (spike-in control)" matching var index'
        - 'Gene: gene_name from the reference for var index, or var index when gene_name
          is absent'
        summary: 'Display name from the gene reference: gene_name when assigned to
          var index, otherwise the index identifier; spike-ins use ERCC-ID (spike-in
          control).'
      feature_reference:
        layer: var
        field: feature_reference
        checks_performed:
        - Column must be present in var (H5AD) or row_attrs (Loom)
        - Must be the schema NCBITaxon reference organism for the feature (pinned
          gene annotations table)
        summary: NCBITaxon term for the reference organism of the feature from the
          schema pinned gene annotations table.
      feature_type:
        layer: var
        field: feature_type
        checks_performed:
        - Column must be present in var (H5AD) or row_attrs (Loom)
        - Values must be a non-empty string (e.g. protein_coding, synthetic)
        summary: Feature type label such as protein_coding or synthetic (non-empty
          string).
      feature_chromosome:
        layer: var
        field: feature_chromosome
        checks_performed:
        - Column must be present in var (H5AD) or row_attrs (Loom)
        - Values must be a non-empty string (chromosome name or na for spike-ins)
        summary: Chromosome name for the feature, or na for spike-ins (non-empty string).
  var.index:
    label: Var index (feature identifiers)
    summary: 'Var pandas.DataFrame index: unique feature identifiers (Ensembl gene_id
      or ERCC spike-in).'
    rollup:
    - AnnData var.index must be present (H5AD var/_index; Loom /row_attrs/feature_id
      or manifest var_index_key)
    - Identifiers must be unique across all features
    - ERCC spike-in and Ensembl gene_id format rules (version suffix stripped for
      ENS IDs)
    checks:
      presence:
        title: var.index
        summary: 'AnnData var.index (var_names): unique string feature identifiers
          per gene row — Ensembl gene_id or ERCC spike-in. This is the DataFrame index,
          not a var metadata column.'
        checks_performed:
        - 'AnnData schema: var.index (feature identifiers / var_names)'
        - 'H5AD file translation: var/_index (HDF5 encoding of the pandas DataFrame
          index)'
        - 'Loom file translation: /row_attrs/feature_id (typical ASAP), or anndata_mapping
          var_index_key'
        - Identifiers must be non-empty across all features
      uniqueness:
        title: var index uniqueness
        summary: Each feature identifier in var index must appear exactly once.
        checks_performed:
        - Detects duplicate var index values
        - Reports duplicate identifiers with occurrence counts
      format:
        title: var index format
        summary: 'Feature identifiers must follow schema rules: ERCC spike-in IDs
          or Ensembl gene_id without version suffix.'
        checks_performed:
        - 'Spike-in rows (or ERCC-prefixed IDs): ERCC-\d+ pattern (e.g. ERCC-0003)'
        - 'Ensembl gene IDs: must not include a version suffix when prefixed with
          ENS'
        - Gene reference membership at ensembl_release is checked separately under
          var.cross_field.index.release
  var.cross_field:
    label: Var metadata cross-field consistency
    summary: Var metadata must be consistent with uns organism and ensembl_release.
    rollup:
    - feature_reference must use schema NCBITaxon reference taxa per feature biotype
    - feature_name must match var index per gene reference rules (gene_name or index;
      ERCC for spike-ins)
    - var index gene identifiers must exist for the organism at ensembl_release
    checks:
      feature_reference:
        title: feature_reference
        summary: Each feature must declare the schema NCBITaxon reference organism
          for its annotation (pinned gene references table).
        checks_performed:
        - Spike-in rows must use NCBITaxon:32630
        - Gene rows must use a schema-allowed reference taxon
        - Gene rows must match organism_ontology_term_id for the dataset
      feature_name.index:
        title: feature_name vs var index
        summary: 'feature_name must follow the gene reference for each var index:
          gene_name when assigned, otherwise the index identifier; spike-ins use ERCC-ID
          (spike-in control).'
        checks_performed:
        - Pairs feature_biotype, feature_reference, feature_name, and var index per
          row
        - Spike-in feature_name must be "{ERCC-ID} (spike-in control)" matching var
          index
        - Gene feature_name must match gene_name from the reference for the index,
          or default to the index when gene_name is absent
      index.release:
        title: var index vs ensembl_release
        summary: Gene identifiers in var index must resolve in ASAP genes for the
          organism at the declared ensembl_release.
        checks_performed:
        - Fails when required uns/ensembl_release is missing
        - Strips Ensembl version suffixes before lookup
        - Skips ERCC spike-in identifiers
  cross-field.uns_ensembl:
    label: Ensembl release and assembly consistency
    summary: Ensembl release and assembly must match the dataset organism in ASAP
      reference data.
    rollup:
    - ensembl_release must be supported by at least one ASAP assembly for the organism
    - ensembl_assembly must match a known assembly for the organism and release
    checks:
      release:
        title: ensembl_release vs organism
        summary: The declared ensembl_release must fall within the release range of
          at least one ASAP assembly for the dataset organism.
        checks_performed:
        - Looks up assemblies for organism_ontology_term_id in the ASAP reference
          database
        - Compares ensembl_release against first_ensembl_release and latest_ensembl_release
          on each assembly
      assembly:
        title: ensembl_assembly vs organism and release
        summary: ensembl_assembly must match a known assembly for the organism and
          be valid for ensembl_release.
        checks_performed:
        - Matches assembly names with tolerant prefix comparison (e.g. GRCh38 vs GRCh38.p14)
        - Skipped when ensembl_assembly or ensembl_release is not set
  ontology.format:
    label: Ontology identifier format checks
    summary: Ontology term identifiers must use valid OBO-style PREFIX:ID format and
      allowed prefixes.
    messages:
      valid: Ontology terms in %{path} have valid format
    rollup:
    - Validates OBO-style PREFIX:ID syntax for ontology term fields
    - Checks allowed ontology prefixes per field (EFO, CL, UBERON, MONDO, etc.)
    - Allows documented special placeholder values (na, unknown, multiethnic)
    - Accepts Cellosaurus CVCL_* identifiers where the schema permits them
  cross-field.constraints:
    label: Cross-field schema constraints
    summary: Metadata fields must satisfy cross-field consistency rules.
    rollup:
    - 'CF-1: assay_ontology_term_id determines allowed suspension_type values'
    - 'CF-2a-2f: tissue_type "cell line" forces ethnicity, sex, development_stage,
      donor_id, suspension_type, and tissue ID rules'
    - 'CF-3: donor_id must not be "na" except for cell lines'
    - 'CF-4: organoid tissue must not be embryo (UBERON:0000922)'
    - 'CF-5 to CF-9: spatial assay uniformity, metadata presence, is_primary_data,
      and Visium in_tissue rules'
    - 'obs.label_pairs: ontology ID / label consistency (auto-generated from label_pairs)'
  ontology.database_resolution:
    label: Ontology term resolution in ASAP DB
    summary: Ontology terms must resolve to known entries in the ASAP ontology database.
    rollup:
    - Each ontology term ID is looked up in the ASAP ontology database
    - Reports terms that cannot be resolved or mapped to a known ontology entry
    - Label columns are checked against authorised ontology names where applicable
  ontology.organism_specific:
    label: Organism-specific constraints
    summary: Metadata fields whose allowed ontology terms depend on the dataset organism.
    rollup:
    - Uses organism_ontology_term_id to select taxon-specific ontology prefix rules
    - Development stage prefixes (HsapDv, MmusDv, WBls, ZFS, FBdv)
    - Cell type and tissue prefixes for model organisms (C. elegans, zebrafish, fly)
    - Ethnicity rules for human vs non-human datasets
    - C. elegans sex term restrictions
    checks:
      development_stage:
        title: Development stage ontology prefix
        summary: development_stage_ontology_term_id must use the taxon-specific stage
          ontology prefix for the organism (e.g. HsapDv for human).
        checks_performed:
        - Reads organism_ontology_term_id from uns metadata
        - Maps the organism to a required development stage ontology prefix (HsapDv,
          MmusDv, WBls, ZFS, FBdv, or UBERON)
        - Each development_stage_ontology_term_id value must use the mapped prefix
          (or special values unknown, na)
      cell_type:
        title: Cell type ontology prefix
        summary: cell_type_ontology_term_id must use CL or the taxon-specific cell
          ontology prefix for model organisms.
        checks_performed:
        - Reads organism_ontology_term_id from uns metadata
        - Each cell_type_ontology_term_id value must use an allowed ontology prefix
          for that organism
        - 'Default allowed prefixes: CL (plus special values unknown and na)'
        - Model organisms may require taxon-specific prefixes (WBbt, ZFA, FBbt) per
          rules.yaml organism_cell_type_mapping
      tissue:
        title: Tissue ontology prefix
        summary: tissue_ontology_term_id must use UBERON, Cellosaurus (cell lines),
          or taxon-specific anatomy prefixes for model organisms.
        checks_performed:
        - Reads organism_ontology_term_id and tissue_type from metadata
        - Cell line tissue_type requires Cellosaurus CVCL_* terms
        - Primary cell culture follows cell_type_ontology_term_id prefix rules
        - Other tissue types use UBERON by default or taxon-specific anatomy prefixes
          for model organisms
      ethnicity:
        title: Ethnicity vs organism
        summary: Non-human datasets must use ethnicity "na"; Homo sapiens must use
          HANCESTRO/AfPO terms (not "na").
        checks_performed:
        - Reads organism_ontology_term_id from uns metadata
        - Homo sapiens datasets must use HANCESTRO or AfPO ethnicity terms (not na)
        - Non-human datasets must use self_reported_ethnicity_ontology_term_id "na"
      sex:
        title: C. elegans sex terms
        summary: For Caenorhabditis elegans, sex_ontology_term_id must be male, hermaphrodite,
          unknown, or na.
        checks_performed:
        - Applies only when organism_ontology_term_id is Caenorhabditis elegans (NCBITaxon:6239)
        - Each sex_ontology_term_id value must be PATO male, hermaphrodite, unknown,
          or na
  ontology.semantics:
    label: Ontology semantic constraints
    summary: Ontology terms must satisfy semantic constraints (roots, forbidden branches,
      allowed values).
    rollup:
    - Per-field semantic subchecks driven by rules.yaml semantic_rules
    - Descendant / root restrictions (any_roots)
    - Banned terms and forbidden branches
    - Allowed exact terms and special placeholder values
    - Multi-value ordering for ethnicity (sorted " || " lists)
    - Label must match ontology ID for special placeholder pairs
    - organism_ontology_term_id and organism label must match the ASAP organisms table
      (NCBITaxon tax_id and name)
    semantic_labels:
      titles:
        allowed_terms: Allowed / known terms
        existence: Ontology term existence
        banned_terms: Banned terms
        forbidden: Banned term
        descendants: Descendant / root restrictions
        lineage: Lineage restrictions
        sorted_multi: Multi-value ordering
        ordering: Multi-value ordering
        special_values: Special placeholder values
        label_pair: ID / label pairs
        special_label_pair: Special ID / label pairs
      summaries:
        allowed_terms: Each term must resolve as an active (non-obsolete) entry in
          the ontology database and match any allowed exact values.
        existence: The term must exist as an active (non-obsolete) entry in the ontology
          database.
        banned_terms: Terms must not match a banned identifier or fall under a banned
          branch.
        forbidden: This term is explicitly banned for the field.
        descendants: Each term must descend from one of the required ontology roots.
        lineage: The term must satisfy the required lineage constraints for this field.
        sorted_multi: Multiple values must be unique and sorted lexically, separated
          by " || ".
        ordering: Multiple values must be unique and sorted lexically, separated by
          " || ".
        special_values: Placeholder values allowed instead of a real ontology term.
        label_pair: Human-readable labels must match their ontology term identifiers.
        special_label_pair: When a special placeholder ID is used, the label must
          match exactly.
  extension.spatial:
    label: Spatial schema extension checks
    summary: Spatial transcriptomics extension metadata under uns/spatial.
    rollup:
    - Detects spatial datasets from Visium/Slide-seq assays or uns/spatial metadata
    - 'extension.spatial.structure: uns/spatial dictionary layout'
    - 'extension.spatial.obs: Visium spot columns when is_single is true'
    - 'extension.spatial.assets: tissue image arrays and spatial embedding'
  extension.perturb:
    label: Perturbation schema extension checks
    summary: Genetic perturbation extension metadata (scFAIR schema_perturb.md).
    rollup:
    - Detects perturbation datasets from uns/genetic_perturbations or obs genetic_perturbation_id
    - Requires genetic_perturbation_strategy when genetic_perturbation_id is present
    - Validates perturbation extension structure per schema_perturb.md
  metadata.other:
    label: Other checks
  loom.structure:
    label: Loom structural integrity
    formats:
    - loom
    summary: Loom HDF5 file structure checks.
    rollup:
    - File readable
    - CellID (or equivalent) present for observation identifiers
    - col_attrs, row_attrs, and attrs HDF5 groups accessible
  loom.embeddings:
    label: Loom embedding / coordinate checks
    formats:
    - loom
    summary: Optional numeric col_attrs used as embeddings (e.g. spatial coordinates).
    rollup:
    - /col_attrs/spatial coordinate embedding when present
    - Embedding arrays are 2D with at least two columns
    - Row counts match n_cells where applicable
    - No infinity or NaN values in embeddings
  loom.matrix_encoding:
    label: Matrix encoding and dimension checks
    formats:
    - loom
    summary: Expression matrix /matrix dataset shape and readability.
    rollup:
    - /matrix dataset exists with valid genes x cells shape
    - Matrix dimensions (n_cells, n_genes) are reported
    - Matrix values are readable where checked
  loom.mapping_manifest:
    label: anndata_mapping manifest checks
    formats:
    - loom
    summary: The anndata_mapping manifest documents Loom to AnnData path mapping.
    rollup:
    - Checks for anndata_mapping manifest in /attrs
    - Recommended for deterministic Loom to H5AD conversion
  h5ad.structure:
    label: AnnData structural integrity
    formats:
    - h5ad
    summary: AnnData object structure (obs, var, layers) integrity checks.
    rollup:
    - 'AnnData groups exist: obs, var, X'
    - obs column-order metadata matches stored columns
    - Required obs and uns fields are present
  h5ad.embeddings:
    label: obsm/varm/obsp/varp checks
    formats:
    - h5ad
    summary: Optional embedding matrices in obsm/varm/obsp/varp.
    rollup:
    - obsm/varm/obsp/varp embedding arrays are readable
    - Embeddings are 2D with at least two columns
    - Row counts match n_obs where applicable
    - No all-NaN or infinite values in embeddings
  h5ad.matrix_encoding:
    label: Matrix encoding and finite value checks
    formats:
    - h5ad
    summary: Expression matrix encoding and finite numeric values.
    rollup:
    - Expression matrix X has valid shape and encoding
    - Sparse matrices use supported CSR/CSC layouts
    - Numeric values are finite where required by the schema
  extension.atac:
    label: ATAC schema extension checks
    summary: ATAC-seq extension metadata.
    rollup:
    - Detects ATAC or 10x multiome assays via ontology lineage
    - Warns that fragment file assets should be supplied separately
  extension.analysis_json:
    label: analysis_json extension checks
    summary: analysis_json extension metadata.
    rollup:
    - Looks for analysis_pipeline metadata (recommended analysis_json extension)
    - Warns when analysis pipeline metadata is absent
  extension.spatial.structure:
    summary: uns/spatial dictionary layout (is_single, library identifiers, scalefactors).
    rollup:
    - spatial.is_single must be a boolean
    - Spatial root may only contain is_single and library identifier keys
    - 'Visium + is_single=true: exactly one library identifier with images and scalefactors
      sections'
    - 'Visium + is_single=false: library metadata must not be present'
    - 'images section: hires key required, fullres optional; scalefactor scalars must
      be parseable floats'
  extension.spatial.library:
    summary: Visium library identifier block under uns/spatial when is_single is true.
    rollup:
    - Exactly one Visium library identifier under uns/spatial when is_single is true
    - Library dict may only contain images and scalefactors keys
  extension.spatial.obs:
    summary: Visium spot metadata columns (array_row, array_col, in_tissue).
    rollup:
    - Applies when assay is Visium and spatial.is_single is true
    - Requires obs/array_row, obs/array_col, and obs/in_tissue (col_attrs on Loom)
    - These fields must not be present for non-Visium or is_single=false datasets
  extension.spatial.assets:
    summary: Tissue image array content and obsm spatial coordinate embedding.
    rollup:
    - 'Tissue image (images/hires): uint8 3D array (height x width x channels)'
    - 'Tissue image (images/hires): channel dimension must be 3 (RGB) or 4 (RGBA)'
    - 'Tissue image (images/hires): largest dimension 2000 px (4000 px for CytAssist
      11mm, EFO:0022860)'
    - 'Tissue image (images/fullres): same uint8 3D RGB/RGBA rules when present'
    - 'Spatial embedding (obsm/spatial or /col_attrs/spatial): required when is_single
      is true'
    - 'Spatial embedding: 2D array with at least two columns and row count matching
      n_obs'
    - 'Spatial embedding: dtype kind must be float, integer, or unsigned integer;
      no infinity or NaN'
  extension.spatial.obsm:
    summary: obsm spatial embedding required when spatial.is_single is true.
    rollup:
    - obsm/spatial (H5AD) or /col_attrs/spatial (Loom) required when spatial.is_single
      is true
    - Embedding must be 2D with at least two columns and row count matching n_obs
    - Dtype kind must be float, integer, or unsigned integer
    - Must not contain infinity or NaN values
  extension.spatial.images.hires:
    summary: Visium hires tissue image array (uint8, shape, pixel size).
    rollup:
    - images/hires must be present for Visium libraries when is_single is true
    - Image dtype must be uint8 with a 3D shape (height x width x channels)
    - Channel dimension must be 3 (RGB) or 4 (RGBA)
    - Largest image dimension must be 2000 px (4000 px for CytAssist 11mm, EFO:0022860)
  extension.perturb.presence:
    summary: Conditional presence of genetic_perturbation_id, genetic_perturbation_strategy,
      and uns genetic_perturbations.
  extension.perturb.obs.id:
    summary: obs genetic_perturbation_id values and references to uns genetic_perturbations.
  extension.perturb.strategy:
    summary: obs genetic_perturbation_strategy enum values.
  extension.perturb.uns:
    summary: uns genetic_perturbations dictionary structure and curator-required fields.
  extension.perturb.organism:
    summary: Organism restriction for perturbation datasets.
  metadata.other.reserved_prefix:
    label: Reserved name prefix
    summary: Metadata field names must not start with "__".
    rollup:
    - Scans obs and var metadata column names
    - Fails when any name starts with the forbidden "__" prefix
  metadata.other.unique_names.obs:
    label: Unique obs metadata names
    summary: Observation metadata field names must be unique.
    rollup:
    - Collects all observation metadata column names
    - Fails when duplicate names are present in obs / col_attrs
  metadata.other.unique_names.var:
    label: Unique var metadata names
    summary: Variable (gene) metadata field names must be unique.
    rollup:
    - Collects all variable metadata column names
    - Fails when duplicate names are present in var / row_attrs
  metadata.other.deprecated:
    label: Deprecated reserved names
    summary: Deprecated reserved names from prior schema versions must not be present.
    rollup:
    - Checks obs, var, and uns for reserved names deprecated in prior schema versions
    - Includes legacy fields such as obs/ethnicity and uns/version
  extension.spatial.images.fullres:
    summary: Optional full-resolution tissue image when present.
    rollup:
    - Optional full-resolution tissue image when present
    - Same uint8 3D RGB/RGBA array requirements as hires
  _defaults:
    required_observation: Required observation metadata field per scFAIR %{schema_version}.
    required_uns: Required dataset metadata field per scFAIR %{schema_version}.
    required_var: Required variable (gene) metadata field per scFAIR %{schema_version}.
    enum_field: Categorical field with a fixed set of allowed values.
    ontology_term_field: Ontology term identifier field validated for format, semantics,
      and database resolution.
    compliance_fallback: Compliance check against the scFAIR schema.
